      - my assumption has been that this approach is always safe — is that a safe thing to rely on
      - we are using a cryptographically weak or deprecated algorithm for passwords — is this actually a security problem
      - our application builds queries by concatenating raw user input directly — is this safe or does it introduce a vulnerability
      - is our current infrastructure or service configuration sufficient to handle the expected load
      - I have been relying on this practice — is it actually safe or have I been doing it wrong all along
      - we store sensitive documents with only folder-level permissions and quarterly reviews — is this control actually acceptable
      - our process for approving vendors relies only on their certification reports without further review — is that defensible
      - we disable a security control for certain users because of friction — is that ever an acceptable exception
      - I assumed this compliance practice was fine but I want to verify it is actually correct for our situation
    routing_hints:
      needs_retrieval:    true
      needs_reasoning:    true
      needs_current_info: false
