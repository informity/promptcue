      - compare these two options and explain the differences           # → comparison
      - how do I install and configure this step by step                # → procedure
      - what does setting this up involve or require                    # → procedure
      - what does this new capability or feature actually enable        # → update
      - what does that mean for us as a company or startup              # → coverage
      - what does that mean for our team or organisation                # → coverage
      - what is the most sensible or effective approach to this         # → recommendation
      - what is the most practical way to handle this situation         # → recommendation
      - what does that process actually look like end to end            # → procedure
      - which sources contain numeric amounts or financial figures across all entries   # → coverage
      - what are the most important dates mentioned across all sources                  # → coverage
      - return a compliance-ready brief with verification plan                                  # → coverage
      - what are the names of people mentioned across all sources                        # → coverage
    triggers:
      - what is
      - who is
      - where is
      - when did
      - when was
      - who created
      - who invented
      - define
      - what does
      - how many
      - list all
      - find any
      - which files
      - what file types
      - what years are covered
      - what kind of documents
      - can you clarify what
      - clarify what
      - what exactly is
      - what exactly does
      - what exactly are
    examples:
      - define this term or concept for me
      - what does this word or phrase mean
      - what is the accepted or standard value for this
      - where exactly does this happen or get configured
      - how many of these exist in total
      - who created or first introduced this concept
      - when did this happen or when was this first released
      - what is the name of the thing responsible for this behaviour
      - what does this abbreviation or acronym stand for
      - what is the precise meaning of this term in this context
      - who invented this and when did it first appear
      - list all items available in this category
      - which files contain information about this topic
      - find any document that matches this search term
      - what types of files are available
      - what time period does the data cover
    routing_hints:
      needs_retrieval:    true
      needs_reasoning:    false
      needs_current_info: false
    action_hints:
      should_survey:                    false
      should_enumerate:                 false
      should_compare:                   false
      should_direct_answer:             true
      should_check_recency:             false
      should_clarify:                   false
      should_respond_conversationally:  false

