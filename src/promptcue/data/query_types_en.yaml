# PromptCue default query type registry
# Single source of truth for: labels, descriptions, triggers, examples, routing directives,
# scope, and action hints.
#
# triggers     — short phrases for the deterministic classifier (word-boundary regex matching)
# examples     — full realistic sentences for the semantic classifier (embedding anchors)
# scope        — query breadth: broad | focused | comparative | exploratory
# routing_hints keys: needs_retrieval, needs_reasoning, needs_current_info, needs_chat_history
# action_hints keys:  should_survey, should_enumerate, should_compare,
#                     should_direct_answer, should_check_recency,
#                     should_clarify, should_respond_conversationally

query_types:

  - label: coverage
    description: Broad overview or tell-me-everything request. The user wants a wide survey, not a single answer.
    scope: broad
    negatives:
      - what is the exact definition of this term                       # → lookup
      - how do I set this up from scratch step by step                  # → procedure
      - summarize the document I just shared with you                   # → summarization
      - explain briefly how this works in a nutshell                    # → summarization
      - explain what this concept is in a concise way                   # → summarization
    triggers:
      - tell me everything about
      - tell me about
      - give me an overview
      - overview of
      - cover the basics
      - what should I know about
      - what should we know about
      - explain the big picture
      - big picture
      - broad overview
      - all about
      - full picture
      - bring me up to speed
      - get up to speed on
      - up to speed on
      - walk me through the landscape
      - walk me through the ecosystem
      - walk me through the complete
      - walk me through everything
      - entire landscape
      - complete landscape
      - full landscape
      - the whole landscape
      - what does that mean for us
      - what does this mean for us
      - what does that mean for our
      - what does this mean for our
      - does that actually mean for us
      - does this actually mean for us
      - does that mean for us
      - does this mean for us
      - all the things that absolutely
      - what are all the things
      - across all documents
      - across all records
      - most important dates across all
      - key amounts found
      - names of people mentioned across all documents
      - compliance-ready brief
      - requested output contract
      - verification plan
    examples:
      - give me an overview of this topic
      - tell me everything you know about this subject
      - cover the basics and give me a broad overview of the subject
      - what should I know about this area before diving in
      - explain the big picture and all the key concepts involved
      - walk me through the whole landscape of this field at a high level
      - explain everything about this from first principles to advanced usage
      - I want a complete high-level understanding of this topic end to end
      - give me a comprehensive overview covering all the major aspects of this
      - what are all the important things to know about this subject
      - I have been out of touch with this area — bring me up to speed on where things stand
      - I need to get up to speed on this — explain what it is, how it works, and the key things to know
      - I am completely new to this area and want to understand the full landscape — what it is, the key tools, and the core practices
      - help me understand the complete picture of this field including all the major tools, concepts, and how they fit together
      - we just entered this domain for the first time and I need to understand what that actually means for us across all the areas involved
      - what are all the things we absolutely need to get right for something like this — give me a full map not a single answer
      - which sources contain numeric amounts or financial figures across all entries
      - what are the most important dates mentioned across all sources
      - return a compliance-ready brief with requested output contract and verification plan
      - what are the names of people mentioned across all sources
    routing_hints:
      needs_retrieval:    true
      needs_reasoning:    false
      needs_current_info: false
    action_hints:
      should_survey:                    true
      should_enumerate:                 false
      should_compare:                   false
      should_direct_answer:             false
      should_check_recency:             false
      should_clarify:                   false
      should_respond_conversationally:  false

  - label: lookup
    description: Specific, targeted request for a single fact, definition, or detail.
