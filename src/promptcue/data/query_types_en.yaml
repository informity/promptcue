    routing_hints:
      needs_retrieval:    false
      needs_reasoning:    true
      needs_current_info: false
    action_hints:
      should_survey:                    false
      should_enumerate:                 false
      should_compare:                   false
      should_direct_answer:             true   # analysis produces a single coherent evaluation
      should_check_recency:             false
      should_clarify:                   false
      should_respond_conversationally:  false
    # analysis sits adjacent to comparison and validation in embedding space.
    # A tighter effective margin (0.05) reduces false needs_clarification flags
    # for queries that sit close to those boundaries but still clearly belong here.
    ambiguity_margin_override: 0.05

